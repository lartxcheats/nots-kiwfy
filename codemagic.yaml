workflows:
  ios-kiwufy:
    name: iOS Build - Kiwify
    max_build_duration: 60
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Remove old iOS folder
        script: rm -rf ios
      - name: Add iOS platform
        script: npx cap add ios
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Configure App Icon
        script: |
          echo "Configurando ícone do app..."
          
          # Remover ícones padrão
          rm -rf ios/App/App/Assets.xcassets/AppIcon.appiconset/*
          
          # Copiar o ícone (usa o mesmo para todos os tamanhos)
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
          
          # Criar Contents.json simples (igual ao Mercado Pago)
          cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
          {
            "images": [
              {
                "filename": "AppIcon-512@2x.png",
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024"
              },
              {
                "filename": "AppIcon-512@2x.png",
                "idiom": "iphone",
                "scale": "2x",
                "size": "60x60"
              },
              {
                "filename": "AppIcon-512@2x.png",
                "idiom": "iphone",
                "scale": "3x",
                "size": "60x60"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          EOF
          
          echo "Ícone configurado!"
      - name: Update Info.plist
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Kiwify Cursos" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Kiwify Cursos" ios/App/App/Info.plist
      - name: Build iOS unsigned
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            VALIDATE_WORKSPACE=NO
      - name: Export IPA unsigned
        script: |
          mkdir -p $CM_BUILD_DIR/ipa
          cd $CM_BUILD_DIR/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r $CM_BUILD_DIR/ipa/Kiwify.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa

  android-kiwufy:
    name: Android Build - Kiwify Cursos
    max_build_duration: 60
    environment:
      node: 18
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor Android
        script: npm install @capacitor/android@5.7.0 --legacy-peer-deps
      - name: Remove old Android folder
        script: rm -rf android
      - name: Add Android platform
        script: npx cap add android
      - name: Capacitor sync
        script: npx cap sync android
      - name: Update app name
        script: |
          sed -i '' 's|<string name="app_name">.*</string>|<string name="app_name">Kiwify Cursos</string>|' android/app/src/main/res/values/strings.xml
      - name: Copy icon
        script: |
          for size in xxxhdpi xxhdpi xhdpi hdpi mdpi; do
            mkdir -p android/app/src/main/res/mipmap-$size
            cp kiwufy/iconeki.png android/app/src/main/res/mipmap-$size/ic_launcher.png
            cp kiwufy/iconeki.png android/app/src/main/res/mipmap-$size/ic_launcher_round.png
            cp kiwufy/iconeki.png android/app/src/main/res/mipmap-$size/ic_launcher_foreground.png
          done
          # Remover adaptive icons que sobrepõem o ícone
          find android/app/src/main/res -name "ic_launcher.xml" -delete
          find android/app/src/main/res -name "ic_launcher_round.xml" -delete
      - name: Build APK
        script: |
          # Corrigir o build.gradle do capacitor-android
          find android -name "build.gradle" | xargs grep -l "flatDir" | while read f; do
            sed -i '' '/flatDir/,/}/d' "$f"
          done
          # Limpar cache corrompido
          rm -rf /Users/builder/.gradle/caches/jars-9/
          cd android
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
