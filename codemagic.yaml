workflows:
  ios-kiwify:
    name: iOS Build - Kiwify
    max_build_duration: 60
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Remove old iOS folder
        script: rm -rf ios
      - name: Add iOS platform
        script: npx cap add ios
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Configure App Icon
        script: |
          echo "Configurando ícone do app..."
          
          # Remover ícones padrão do Capacitor
          rm -rf ios/App/App/Assets.xcassets/AppIcon.appiconset/*
          
          # Copiar o ícone para todos os tamanhos
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-20x20@1x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-20x20@2x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-20x20@3x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-29x29@1x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-29x29@2x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-29x29@3x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-40x40@1x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-40x40@2x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-40x40@3x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-60x60@2x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-60x60@3x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-76x76@1x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-76x76@2x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-83.5x83.5@2x.png
          cp kiwufy/iconeki.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png
          
          # Criar Contents.json
          cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
          {
            "images": [
              {"size":"20x20","idiom":"iphone","filename":"AppIcon-20x20@2x.png","scale":"2x"},
              {"size":"20x20","idiom":"iphone","filename":"AppIcon-20x20@3x.png","scale":"3x"},
              {"size":"29x29","idiom":"iphone","filename":"AppIcon-29x29@2x.png","scale":"2x"},
              {"size":"29x29","idiom":"iphone","filename":"AppIcon-29x29@3x.png","scale":"3x"},
              {"size":"40x40","idiom":"iphone","filename":"AppIcon-40x40@2x.png","scale":"2x"},
              {"size":"40x40","idiom":"iphone","filename":"AppIcon-40x40@3x.png","scale":"3x"},
              {"size":"60x60","idiom":"iphone","filename":"AppIcon-60x60@2x.png","scale":"2x"},
              {"size":"60x60","idiom":"iphone","filename":"AppIcon-60x60@3x.png","scale":"3x"},
              {"size":"20x20","idiom":"ipad","filename":"AppIcon-20x20@1x.png","scale":"1x"},
              {"size":"20x20","idiom":"ipad","filename":"AppIcon-20x20@2x.png","scale":"2x"},
              {"size":"29x29","idiom":"ipad","filename":"AppIcon-29x29@1x.png","scale":"1x"},
              {"size":"29x29","idiom":"ipad","filename":"AppIcon-29x29@2x.png","scale":"2x"},
              {"size":"40x40","idiom":"ipad","filename":"AppIcon-40x40@1x.png","scale":"1x"},
              {"size":"40x40","idiom":"ipad","filename":"AppIcon-40x40@2x.png","scale":"2x"},
              {"size":"76x76","idiom":"ipad","filename":"AppIcon-76x76@1x.png","scale":"1x"},
              {"size":"76x76","idiom":"ipad","filename":"AppIcon-76x76@2x.png","scale":"2x"},
              {"size":"83.5x83.5","idiom":"ipad","filename":"AppIcon-83.5x83.5@2x.png","scale":"2x"},
              {"size":"1024x1024","idiom":"ios-marketing","filename":"AppIcon-1024.png","scale":"1x"}
            ],
            "info":{"version":1,"author":"xcode"}
          }
          EOF
          
          echo "Ícone configurado!"
      - name: Update Info.plist
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Kiwify" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Kiwify" ios/App/App/Info.plist
      - name: Build iOS unsigned
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            VALIDATE_WORKSPACE=NO
      - name: Export IPA unsigned
        script: |
          mkdir -p $CM_BUILD_DIR/ipa
          cd $CM_BUILD_DIR/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r $CM_BUILD_DIR/ipa/Kiwify.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
